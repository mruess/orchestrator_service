- name: Start VM
  hosts: all
  gather_facts: no
  roles:
    - start_vm

- name: Wait for VM to be ready
  hosts: all
  gather_facts: no
  tasks:
    - name: Wait for WinRM connection
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300

- name: Deploy build to test system
  hosts: all
  gather_facts: no
  roles:
    - deploy_build
