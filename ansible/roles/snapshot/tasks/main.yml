- name: Create ready snapshot
  community.proxmox.proxmox_snap:
    api_host: "{{ proxmox_host }}"
    api_user: "{{ proxmox_user }}"
    api_password: "{{ proxmox_password }}"
    vmid: "{{ vmid }}"
    snapname: "ready-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
    state: present
  delegate_to: localhost