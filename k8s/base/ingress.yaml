# k8s/base/backend-ingress.yaml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: orchestrator
spec:
  stripPrefix:
    prefixes:
      - /api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orchestrator-backend
  namespace: orchestrator
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: orchestrator-strip-api-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: orchestrator-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orchestrator-frontend
                port:
                  number: 80
