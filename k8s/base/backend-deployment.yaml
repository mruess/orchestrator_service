# k8s/base/backend-deployment.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: orchestrator  
--- 
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: orchestrator
  name: orchestrator-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator-backend
  template:
    metadata:
      labels:
        app: orchestrator-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: orchestrator-backend
          image: ghcr.io/mruess/orchestrator-backend:v2.1
          ports:
            - containerPort: 8000
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - secretRef:
                name: orchestrator-env
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
# k8s/base/backend-service.yaml
apiVersion: v1
kind: Service
metadata:
  namespace: orchestrator
  name: orchestrator-backend
spec:
  selector:
    app: orchestrator-backend
  ports:
    - port: 8000
      targetPort: 8000
